<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC E2E 測試報告</title>
<style>
:root{--teal:#37A6A9;--gold:#F9C04C;--navy:#17335F;--pass:#22c55e;--skip:#f59e0b;--fail:#ef4444;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--prd-red:#dc2626;--prd-red-bg:#fef2f2;--prd-red-border:#fecaca;--prd-yellow:#b45309;--prd-yellow-bg:#fffbeb;--prd-yellow-border:#fde68a;--prd-green:#166534;--prd-green-bg:#f0fdf4;--prd-green-border:#bbf7d0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.summary-bar{position:sticky;top:0;z-index:100;background:var(--navy);color:#fff;display:flex;align-items:center;gap:20px;padding:10px 24px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.summary-bar .title{font-size:17px;font-weight:700;color:var(--gold);margin-right:12px;white-space:nowrap}
.summary-bar .stat{display:flex;align-items:center;gap:5px;font-size:12px}
.summary-bar .stat .num{font-size:18px;font-weight:700}
.stat-total .num{color:#fff}.stat-pass .num{color:#4ade80}.stat-skip .num{color:var(--gold)}.stat-fail .num{color:#f87171}
.progress-wrap{flex:1;background:rgba(255,255,255,.15);border-radius:99px;height:6px;min-width:100px}
.progress-fill{height:6px;border-radius:99px;background:var(--pass)}
.duration{font-size:11px;color:rgba(255,255,255,.6);margin-left:auto;white-space:nowrap}
.tabs-wrap{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:99;overflow-x:auto}
.tabs{display:flex;padding:0 24px;gap:2px}
.tab-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}.tab-btn:hover{color:var(--text)}
.main{padding:16px 24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.module-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.module-badge{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.module-title{font-size:18px;font-weight:700;color:var(--navy)}
.module-stats{margin-left:auto;display:flex;gap:6px;font-size:12px}
.ms{padding:2px 7px;border-radius:99px;font-weight:600}
.ms-pass{background:#dcfce7;color:#166534}.ms-skip{background:#fef9c3;color:#854d0e}.ms-fail{background:#fee2e2;color:#991b1b}
.section-divider{font-size:13px;font-weight:700;color:var(--navy);padding:12px 0 8px;border-bottom:2px solid var(--teal);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-divider .sd-icon{font-size:15px}
.spec-group{margin-bottom:16px}
.spec-group-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:6px}
.test-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:2px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:background .1s}
.test-row:hover{background:#f1f5f9;border-color:var(--teal)}
.test-status{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.ts-pass{background:#dcfce7;color:#16a34a}.ts-skip{background:#fef9c3;color:#92400e}.ts-fail{background:#fee2e2;color:#dc2626}
.test-info{flex:1;min-width:0}
.test-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.test-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.api-badge{display:inline-block;background:#ede9fe;color:#6d28d9;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.skip-badge{display:inline-block;background:#fef9c3;color:#854d0e;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.fail-badge{display:inline-block;background:#fee2e2;color:#dc2626;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.role-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px}
.role-admin{background:#dbeafe;color:#1e40af}.role-student{background:#dcfce7;color:#166534}.role-supervisor{background:#fef9c3;color:#854d0e}.role-visitor{background:#f1f5f9;color:#64748b}
.test-thumb{flex-shrink:0}
.test-thumb img{width:48px;height:32px;object-fit:cover;border-radius:3px;border:1px solid var(--border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:flex-start;justify-content:center;padding:40px 24px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:12px;max-width:860px;width:100%;padding:24px;position:relative;margin:auto}
.modal-close{position:absolute;top:14px;right:16px;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;border:none;background:none}
.modal-close:hover{color:var(--text)}
.modal-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-right:32px}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.modal-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.mb-pass{background:#dcfce7;color:#166534}.mb-skip{background:#fef9c3;color:#854d0e}.mb-fail{background:#fee2e2;color:#991b1b}.mb-api{background:#ede9fe;color:#6d28d9}
.modal-screenshots{margin-top:16px}
.modal-screenshots h4{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.modal-img-wrap{margin-bottom:12px}
.modal-img-wrap img{max-width:100%;border-radius:6px;border:1px solid var(--border);display:block}
.modal-img-caption{font-size:11px;color:var(--muted);margin-top:4px;text-align:center}
.no-screenshot{background:#f8fafc;border:1px dashed var(--border);border-radius:6px;padding:16px;text-align:center;color:var(--muted);font-size:13px}
.prd-group{margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.prd-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.prd-row:last-child{border-bottom:none}
.prd-num{font-size:11px;font-weight:700;color:var(--muted);width:22px;flex-shrink:0;padding-top:2px}
.prd-badge{flex-shrink:0;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:1px}
.prd-badge-red{background:var(--prd-red-bg);color:var(--prd-red);border:1px solid var(--prd-red-border)}
.prd-badge-yellow{background:var(--prd-yellow-bg);color:var(--prd-yellow);border:1px solid var(--prd-yellow-border)}
.prd-badge-green{background:var(--prd-green-bg);color:var(--prd-green);border:1px solid var(--prd-green-border)}
.prd-info{flex:1;min-width:0}
.prd-feature-name{font-size:14px;font-weight:600;color:var(--text)}
.prd-feature-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.prd-linked{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prd-version-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-right:4px;background:#ede9fe;color:#6d28d9}
.gallery-section{margin-top:24px}
.gallery-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--teal)}
.gallery-cat{margin-bottom:20px}
.gallery-cat-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.gallery-item{cursor:pointer}
.gallery-item img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:5px;border:1px solid var(--border);transition:all .15s}
.gallery-item:hover img{border-color:var(--teal);box-shadow:0 3px 10px rgba(55,166,169,.25)}
.gallery-item p{font-size:11px;color:var(--muted);margin-top:3px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.test-verify{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vb{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle}
.vb-ai{background:#dcfce7;color:#166534}.vb-pending{background:#fef9c3;color:#854d0e}.vb-api{background:#ede9fe;color:#6d28d9}
.modal-spec{font-size:12px;color:var(--text);margin-top:6px;padding:4px 8px;background:#f1f5f9;border-radius:4px}.modal-spec b{color:var(--teal)}
.verify-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.verify-box.verify-api{background:#ede9fe;border-color:#c4b5fd;color:#6d28d9;font-size:13px}
.verify-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted)}
.verify-ai{background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.verify-pending{background:#fef9c3;color:#854d0e;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.verify-row{font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.5}.verify-label{font-weight:600;color:var(--teal);margin-right:4px}
.loading{text-align:center;padding:60px 24px;color:var(--muted);font-size:16px}
.prd-mini-summary{display:flex;gap:12px;align-items:center;padding:12px 16px;background:var(--navy);border-radius:8px;margin-bottom:16px;color:#fff;flex-wrap:wrap}
.prd-mini-pct{font-size:28px;font-weight:800;color:var(--gold)}.prd-mini-label{font-size:12px;color:rgba(255,255,255,.6)}
.prd-mini-bar-wrap{flex:1;min-width:100px;background:rgba(255,255,255,.15);border-radius:99px;height:6px}
.prd-mini-bar{height:6px;border-radius:99px;background:var(--gold)}
.prd-mini-stats{display:flex;gap:8px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div class="summary-bar">
  <span class="title">CNC E2E 測試報告</span>
  <div class="stat stat-total"><span class="num" id="s-total">-</span><span>總計</span></div>
  <div class="stat stat-pass"><span class="num" id="s-pass">-</span><span>通過</span></div>
  <div class="stat stat-skip"><span class="num" id="s-skip">-</span><span>略過</span></div>
  <div class="stat stat-fail"><span class="num" id="s-fail">-</span><span>失敗</span></div>
  <div class="progress-wrap"><div class="progress-fill" id="s-bar" style="width:0%"></div></div>
  <span class="duration" id="s-meta"></span>
</div>
<div style="background:#f0fdf4;border-bottom:1px solid #bbf7d0;padding:8px 24px;font-size:13px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
  <span style="font-weight:700;color:#166534">測試帳號</span>
  <span style="color:#64748b">管理員：admin@careercreator.tw</span>
  <span style="color:#64748b">督導：supervisor@careercreator.tw</span>
  <span style="color:#64748b">學員：alice@test.com / bob@test.com</span>
  <span style="color:#166534;font-style:italic">密碼請洽 PM</span>
  <a href="https://cnc-frontend-849078733818.asia-east1.run.app/login" target="_blank" style="color:#37A6A9;font-weight:600;text-decoration:none;margin-left:auto">開啟系統 →</a>
</div>
<div class="tabs-wrap"><div class="tabs" id="tab-buttons"></div></div>
<div class="main" id="main-content"><div class="loading">載入報告資料中...</div></div>
<div class="modal-overlay" id="modal" onclick="closeModalIfBg(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-screenshots" id="modal-screenshots"></div>
  </div>
</div>
<script>
/* CNC E2E Report — merged PRD + E2E per module */
/* NOTE: All dynamic content is escaped via escHtml/escAttr. Data source is CI-generated JSON. */
var BASE='https://youngger9765.github.io/navi-career-CNC-docs/screenshots/';
var PAGE_FALLBACK={'/admin/cohorts':'admin--admin-cohorts.png','/admin/enrollments':'admin--admin-enrollments.png','/admin/pages':'admin--admin-pages.png','/admin/products':'admin--admin-products.png','/admin/classrooms':'admin--admin-classrooms.png','/admin/grading':'admin--admin-grading.png','/admin/supervision':'admin--admin-supervision.png','/admin/certifications':'admin--admin-certifications.png','/admin/crm':'admin--admin-crm.png','/admin/agents':'admin--admin-agents.png','/admin/marketing':'admin--admin-marketing.png','/admin/refunds':'admin--admin-refunds.png','/admin/promo-codes':'admin--admin-promo-codes.png','/admin/referrals':'admin--admin-referrals.png','/admin/dashboard':'admin--admin-dashboard.png','/student/dashboard':'student--student-dashboard.png','/student/enrollments':'student--student-enrollments.png','/student/courses':'student--student-courses.png','/student/payments':'student--student-payments.png','/student/crm':'student--student-crm.png','/student/supervision':'student--student-supervision.png','/student/certifications':'student--student-certifications.png','/student/profile':'student--student-profile.png','/courses':'visitor--courses.png','/enroll':'visitor--enroll.png','/login':'visitor--login.png','/':'visitor--homepage.png'};
var SITE='https://cnc-frontend-849078733818.asia-east1.run.app';
var TAB_CONFIG=[
  {id:'m1',label:'M1 報名金流',prdModule:'M1',links:[
    {label:'課程列表（訪客）',url:'/courses',role:'訪客'},
    {label:'報名頁',url:'/enroll',role:'訪客'},
    {label:'報名管理（管理員）',url:'/admin/enrollments',role:'管理員'},
    {label:'梯次管理',url:'/admin/cohorts',role:'管理員'},
    {label:'折扣碼管理',url:'/admin/promo-codes',role:'管理員'},
    {label:'退款設定',url:'/admin/refunds',role:'管理員'},
    {label:'我的報名（學員）',url:'/student/enrollments',role:'學員'},
    {label:'付款紀錄',url:'/student/payments',role:'學員'}
  ]},
  {id:'m2',label:'M2 行銷頁面',prdModule:'M2',links:[
    {label:'課程行銷頁',url:'/courses',role:'訪客'},
    {label:'商品管理',url:'/admin/products',role:'管理員'},
    {label:'行銷管理',url:'/admin/marketing',role:'管理員'},
    {label:'頁面管理',url:'/admin/pages',role:'管理員'}
  ]},
  {id:'m3',label:'M3 運課管理',prdModule:'M3',links:[
    {label:'教室管理',url:'/admin/classrooms',role:'管理員'},
    {label:'作業批改',url:'/admin/grading',role:'管理員'},
    {label:'行政日程',url:'/admin/schedule',role:'管理員'},
    {label:'我的課程（學員）',url:'/student/courses',role:'學員'}
  ]},
  {id:'m4',label:'M4 督導認證',prdModule:'M4',links:[
    {label:'督導管理',url:'/admin/supervision',role:'管理員'},
    {label:'認證管理',url:'/admin/certifications',role:'管理員'},
    {label:'我的督導（學員）',url:'/student/supervision',role:'學員'},
    {label:'我的認證',url:'/student/certifications',role:'學員'}
  ]},
  {id:'m5',label:'M5 會員 CRM',prdModule:'M5',links:[
    {label:'會員管理',url:'/admin/crm',role:'管理員'},
    {label:'代理商管理',url:'/admin/agents',role:'管理員'},
    {label:'推薦獎金',url:'/admin/referrals',role:'管理員'},
    {label:'會員中心（學員）',url:'/student/crm',role:'學員'},
    {label:'推薦紀錄',url:'/student/referrals',role:'學員'}
  ]},
  {id:'access',label:'權限控管',links:[
    {label:'登入頁',url:'/login',role:'訪客'},
    {label:'管理員後台',url:'/admin/dashboard',role:'管理員'},
    {label:'學員儀表板',url:'/student/dashboard',role:'學員'}
  ]},
  {id:'mobile',label:'手機版'},
  {id:'screenshots',label:'截圖總覽'}
];
var DATA=null,_testData={};
function escHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function escAttr(s){return(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getRoleBadge(t){
  var spec=(t.spec||'').toLowerCase();var name=(t.name||'').toLowerCase();
  if(spec.indexOf('admin')>=0||name.indexOf('管理員')>=0||name.indexOf('admin')>=0) return '<span class="role-badge role-admin">管理員</span>';
  if(spec.indexOf('supervisor')>=0||name.indexOf('督導')>=0) return '<span class="role-badge role-supervisor">督導</span>';
  if(spec.indexOf('student')>=0||name.indexOf('學員')>=0||name.indexOf('alice')>=0) return '<span class="role-badge role-student">學員</span>';
  if(spec.indexOf('access')>=0||name.indexOf('訪客')>=0||name.indexOf('未認證')>=0) return '<span class="role-badge role-visitor">訪客</span>';
  return '';
}
function init(){
  fetch('report-data.json')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){DATA=d;updateSummaryBar();renderTabs();renderAll();})
    .catch(function(e){document.getElementById('main-content').textContent='Unable to load report-data.json: '+e.message;});
}
function updateSummaryBar(){
  var s=DATA.summary;
  document.getElementById('s-total').textContent=s.total;
  document.getElementById('s-pass').textContent=s.passed;
  document.getElementById('s-skip').textContent=s.skipped;
  document.getElementById('s-fail').textContent=s.failed;
  var pct=s.total?Math.round((s.passed/s.total)*100):0;
  document.getElementById('s-bar').style.width=pct+'%';
  var date=DATA.generatedAt?new Date(DATA.generatedAt).toLocaleDateString('zh-TW'):'';
  document.getElementById('s-meta').textContent='commit: '+(DATA.commitSha||'?')+' | '+date;
}
function renderTabs(){
  var c=document.getElementById('tab-buttons');var h='';
  TAB_CONFIG.forEach(function(tc,i){h+='<button class="tab-btn'+(i===0?' active':'')+'" onclick="showTab(\''+tc.id+'\',this)">'+tc.label+'</button>';});
  c.innerHTML=h;
}
function renderAll(){
  var main=document.getElementById('main-content');main.innerHTML='';
  TAB_CONFIG.forEach(function(tc,idx){
    var panel=document.createElement('div');
    panel.id='tab-'+tc.id;panel.className='tab-panel'+(idx===0?' active':'');
    if(tc.id==='screenshots'){panel.innerHTML=renderGalleryTab();}
    else if(tc.prdModule){panel.innerHTML=renderMergedModuleTab(tc.id,tc.label,tc.prdModule,tc.links);}
    else{panel.innerHTML=renderTestTab(tc.id,tc.label,tc.links);}
    main.appendChild(panel);
  });
}
function getScreenshots(t){
  var urls=[];
  if(t.shots&&t.shots.length){t.shots.forEach(function(s){urls.push({url:BASE+s,label:s.replace(/^(flow|crud)\//,'').replace('.png','')});});}
  if(urls.length===0&&t.pages&&t.pages.length){for(var i=0;i<t.pages.length;i++){var f=PAGE_FALLBACK[t.pages[i]];if(f){urls.push({url:BASE+f,label:'頁面截圖'});break;}}}
  return urls;
}
function renderMergedModuleTab(tabId,label,prdModule,links){
  var html='';
  // Quick test links
  if(links&&links.length){
    html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px">\uD83D\uDD17 測試連結（點擊前請先登入對應角色）</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    links.forEach(function(lk){
      var rc=lk.role==='管理員'?'role-admin':lk.role==='學員'?'role-student':lk.role==='督導'?'role-supervisor':'role-visitor';
      html+='<a href="'+SITE+lk.url+'" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;color:var(--text);text-decoration:none;transition:all .15s;background:var(--bg)" onmouseover="this.style.borderColor=\'var(--teal)\';this.style.color=\'var(--teal)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--text)\'"><span class="role-badge '+rc+'" style="margin-left:0">'+escHtml(lk.role)+'</span>'+escHtml(lk.label)+' \u2192</a>';
    });
    html+='</div></div>';
  }
  var prd=DATA.prdCoverage||{summary:{green:0,yellow:0,red:0},items:[]};
  var moduleItems=prd.items.filter(function(i){return i.module===prdModule;});
  if(moduleItems.length>0){
    var gC=moduleItems.filter(function(i){return i.status==='green';}).length;
    var yC=moduleItems.filter(function(i){return i.status==='yellow';}).length;
    var rC=moduleItems.filter(function(i){return i.status==='red';}).length;
    var pct=Math.round((gC/moduleItems.length)*100);
    html+='<div class="prd-mini-summary"><div><div class="prd-mini-pct">'+pct+'%</div><div class="prd-mini-label">需求覆蓋率</div></div><div class="prd-mini-bar-wrap"><div class="prd-mini-bar" style="width:'+Math.max(pct,2)+'%"></div></div><div class="prd-mini-stats"><span style="color:#4ade80">\u25CF 完成 '+gC+'</span>'+(yC?'<span style="color:var(--gold)">\u25CF 不完整 '+yC+'</span>':'')+(rC?'<span style="color:#f87171">\u25CF 未實作 '+rC+'</span>':'')+'</div></div>';
    html+='<div class="section-divider"><span class="sd-icon">\uD83D\uDCCB</span> 需求覆蓋（'+moduleItems.length+' 項）</div>';
    var sorted=moduleItems.slice().sort(function(a,b){var o={red:0,yellow:1,green:2};return(o[a.status]||9)-(o[b.status]||9);});
    html+='<div class="prd-group" style="margin-bottom:8px">';
    sorted.forEach(function(item){
      var bc=item.status==='red'?'prd-badge-red':item.status==='yellow'?'prd-badge-yellow':'prd-badge-green';
      var bl=item.status==='red'?'未實作':item.status==='yellow'?'不完整':'已完成';
      var th=item.screenshot?'<div class="test-thumb" style="margin-left:auto;cursor:pointer"><img src="screenshots/'+item.screenshot+'" alt="" style="width:64px;height:42px;object-fit:cover;border-radius:4px;border:1px solid var(--border)"></div>':'';
      var tags=(item.version?'<span class="prd-version-tag">'+item.version+'</span>':'');
      var ca=item.screenshot?' style="cursor:pointer" onclick="openPrdScreenshot(\'screenshots/'+item.screenshot+'\',\''+escAttr(item.name)+'\')"':'';
      var lv='';
      if(item.linkedTests&&item.linkedTests.length&&DATA.tests){
        var linked=DATA.tests.filter(function(t){return item.linkedTests.some(function(lt){return t.spec.indexOf(lt)>=0;});});
        if(linked.length){var pc=linked.filter(function(t){return t.status==='pass';}).length;lv='<div class="prd-linked"><span class="vb vb-ai">E2E</span>'+pc+'/'+linked.length+' 測試通過';var wa=linked.find(function(t){return t.verification&&t.verification.analyses&&t.verification.analyses[0]&&!t.verification.analyses[0].needsReview;});if(wa){lv+=' \u00B7 <span style="color:var(--teal)">AI：</span>'+escHtml(wa.verification.analyses[0].description);}lv+='</div>';}
      }
      html+='<div class="prd-row"'+ca+'><div class="prd-num">#'+item.num+'</div><span class="prd-badge '+bc+'">'+bl+'</span><div class="prd-info"><div class="prd-feature-name">'+tags+escHtml(item.name)+'</div><div class="prd-feature-desc">'+escHtml(item.desc)+'</div>'+lv+'</div>'+th+'</div>';
    });
    html+='</div>';
  }
  var tests=(DATA.tests||[]).filter(function(t){return t.tab===tabId;});
  var pass=tests.filter(function(t){return t.status==='pass';}).length;
  var skip=tests.filter(function(t){return t.status==='skip';}).length;
  var fail=tests.filter(function(t){return t.status==='fail';}).length;
  if(tests.length>0){
    html+='<div class="section-divider"><span class="sd-icon">\uD83E\uDDEA</span> E2E 測試（'+tests.length+' 個 \u00B7 通過 '+pass+(skip?' \u00B7 略過 '+skip:'')+(fail?' \u00B7 失敗 '+fail:'')+'）</div>';
    var groups={},groupOrder=[];
    tests.forEach(function(t){if(!groups[t.group]){groups[t.group]=[];groupOrder.push(t.group);}groups[t.group].push(t);});
    groupOrder.forEach(function(g){
      html+='<div class="spec-group"><div class="spec-group-title">'+escHtml(g)+'</div>';
      groups[g].forEach(function(t,i){
        var tid=tabId+'_'+g.replace(/[^a-z0-9]/gi,'')+'_'+i;
        var shots=getScreenshots(t);
        var thumb=shots.length?'<div class="test-thumb"><img src="'+shots[0].url+'" alt="" onerror="this.style.display=\'none\'"></div>':'';
        var apiB=t.apiOnly?' <span class="api-badge">API</span>':'';
        var skipB=t.status==='skip'?' <span class="skip-badge">略過</span>':'';
        var failB=t.status==='fail'?' <span class="fail-badge">失敗</span>':'';
        var roleBadge=getRoleBadge(t);
        var sc=t.status==='pass'?'ts-pass':t.status==='skip'?'ts-skip':'ts-fail';
        var si=t.status==='pass'?'\u2713':t.status==='skip'?'\u2212':'\u2717';
        var dur=t.duration?' \u00B7 '+Math.round(t.duration/1000)+'s':'';
        var v=t.verification,vl='';
        if(v&&v.method==='api-only'){vl='<div class="test-verify"><span class="vb vb-api">API</span>透過 HTTP status code 驗證</div>';}
        else if(v&&v.analyses&&v.analyses.length){var a=v.analyses[0];var tg=a.needsReview?'<span class="vb vb-pending">待審查</span>':'<span class="vb vb-ai">AI 已審查</span>';vl='<div class="test-verify">'+tg+escHtml(a.description)+'</div>';}
        html+='<div class="test-row" onclick="openModal(\''+tid+'\')"><div class="test-status '+sc+'">'+si+'</div><div class="test-info"><div class="test-name">'+escHtml(t.name)+apiB+skipB+failB+roleBadge+'</div><div class="test-meta">'+escHtml(t.spec)+dur+'</div>'+vl+'</div>'+thumb+'</div>';
        _testData[tid]=t;
      });
      html+='</div>';
    });
  }
  if(moduleItems.length===0&&tests.length===0){html+='<div class="no-screenshot">此模組暫無需求項目或測試結果</div>';}
  return html;
}
function renderTestTab(tabId,label){
  var tests=(DATA.tests||[]).filter(function(t){return t.tab===tabId;});
  var pass=tests.filter(function(t){return t.status==='pass';}).length;
  var skip=tests.filter(function(t){return t.status==='skip';}).length;
  var fail=tests.filter(function(t){return t.status==='fail';}).length;
  var groups={},groupOrder=[];
  tests.forEach(function(t){if(!groups[t.group]){groups[t.group]=[];groupOrder.push(t.group);}groups[t.group].push(t);});
  var moduleId=label.split(' ')[0];
  var html='<div class="module-header"><span class="module-badge">'+moduleId+'</span><span class="module-title">'+label.replace(moduleId+' ','')+'</span><div class="module-stats"><span class="ms ms-pass">通過 '+pass+'</span>'+(skip?'<span class="ms ms-skip">略過 '+skip+'</span>':'')+(fail?'<span class="ms ms-fail">失敗 '+fail+'</span>':'')+'</div></div>';
  groupOrder.forEach(function(g){
    html+='<div class="spec-group"><div class="spec-group-title">'+escHtml(g)+'</div>';
    groups[g].forEach(function(t,i){
      var tid=tabId+'_'+g.replace(/[^a-z0-9]/gi,'')+'_'+i;
      var shots=getScreenshots(t);
      var thumb=shots.length?'<div class="test-thumb"><img src="'+shots[0].url+'" alt="" onerror="this.style.display=\'none\'"></div>':'';
      var apiB=t.apiOnly?' <span class="api-badge">API</span>':'';
      var skipB=t.status==='skip'?' <span class="skip-badge">略過</span>':'';
      var failB=t.status==='fail'?' <span class="fail-badge">失敗</span>':'';
      var roleBadge=getRoleBadge(t);
      var sc=t.status==='pass'?'ts-pass':t.status==='skip'?'ts-skip':'ts-fail';
      var si=t.status==='pass'?'\u2713':t.status==='skip'?'\u2212':'\u2717';
      var dur=t.duration?' \u00B7 '+Math.round(t.duration/1000)+'s':'';
      var v=t.verification,vl='';
      if(v&&v.method==='api-only'){vl='<div class="test-verify"><span class="vb vb-api">API</span>透過 HTTP status code 驗證</div>';}
      else if(v&&v.analyses&&v.analyses.length){var a=v.analyses[0];var tg=a.needsReview?'<span class="vb vb-pending">待審查</span>':'<span class="vb vb-ai">AI 已審查</span>';vl='<div class="test-verify">'+tg+escHtml(a.description)+'</div>';}
      html+='<div class="test-row" onclick="openModal(\''+tid+'\')"><div class="test-status '+sc+'">'+si+'</div><div class="test-info"><div class="test-name">'+escHtml(t.name)+apiB+skipB+failB+roleBadge+'</div><div class="test-meta">'+escHtml(t.spec)+dur+'</div>'+vl+'</div>'+thumb+'</div>';
      _testData[tid]=t;
    });
    html+='</div>';
  });
  if(tests.length===0)html+='<div class="no-screenshot">此 Tab 無測試結果</div>';
  return html;
}
function renderGalleryTab(){
  var ss=DATA.screenshots||{};
  function gi(list){return(list||[]).map(function(p){var l=p.replace(/^(crud|flow|prd-gaps)\//,'').replace('.png','').replace(/--/g,' ');return'<div class="gallery-item" onclick="openLightboxDirect(\''+BASE+p+'\',\''+escAttr(l)+'\')"><img src="'+BASE+p+'" alt="'+escAttr(l)+'" onerror="this.parentElement.style.display=\'none\'"><p>'+escHtml(l)+'</p></div>';}).join('');}
  return'<div class="gallery-section"><div class="gallery-title">截圖總覽</div><div class="gallery-cat"><div class="gallery-cat-title">頁面截圖（'+(ss.root||[]).length+' 張）</div><div class="gallery-grid">'+gi(ss.root)+'</div></div><div class="gallery-cat"><div class="gallery-cat-title">CRUD 操作截圖（'+(ss.crud||[]).length+' 張）</div><div class="gallery-grid">'+gi(ss.crud)+'</div></div><div class="gallery-cat"><div class="gallery-cat-title">流程截圖（'+(ss.flow||[]).length+' 張）</div><div class="gallery-grid">'+gi(ss.flow)+'</div></div></div>';
}
function openModal(tid){
  var t=_testData[tid];if(!t)return;
  var shots=getScreenshots(t);
  document.getElementById('modal-title').textContent=t.name;
  var sl=t.status==='pass'?'通過':t.status==='skip'?'略過':'失敗';
  var sc=t.status==='pass'?'mb-pass':t.status==='skip'?'mb-skip':'mb-fail';
  var mh='<span class="modal-badge '+sc+'">'+sl+'</span>';
  if(t.duration)mh+='<span style="color:var(--muted)">'+Math.round(t.duration/1000)+'s</span>';
  if(t.apiOnly)mh+='<span class="modal-badge mb-api">API 測試</span>';
  mh+=getRoleBadge(t);
  mh+='<div class="modal-spec"><b>規格：</b>'+escHtml(t.spec)+'</div>';
  document.getElementById('modal-meta').innerHTML=mh;
  var sh='';var v=t.verification;
  if(v){
    if(v.method==='api-only'){sh+='<div class="verify-box verify-api"><b>驗證方式：</b>API 測試，無需截圖。透過 HTTP status code 驗證</div>';}
    else if(v.method==='screenshot'&&v.analyses){v.analyses.forEach(function(a){var at=a.needsReview?'<span class="verify-pending">待審查</span>':'<span class="verify-ai">AI 已審查</span>';sh+='<div class="verify-box"><div class="verify-header">'+at+' <b>'+escHtml(a.path)+'</b></div><div class="verify-row"><span class="verify-label">AI 看到：</span>'+escHtml(a.description)+'</div><div class="verify-row"><span class="verify-label">判定理由：</span>'+escHtml(a.verdict)+'</div><div class="modal-img-wrap"><img src="'+BASE+a.path+'" alt="'+escAttr(a.path)+'" onerror="this.parentElement.innerHTML=\'<div class=\\\'no-screenshot\\\'>截圖載入失敗</div>\'"></div></div>';});}
  }else if(shots.length===0){sh='<div class="no-screenshot">此測試無截圖（API 測試或條件略過）</div>';}
  else{sh='<h4>測試截圖</h4>';shots.forEach(function(s){sh+='<div class="modal-img-wrap"><img src="'+s.url+'" alt="'+escAttr(s.label)+'" onerror="this.parentElement.innerHTML=\'<div class=\\\'no-screenshot\\\'>截圖載入失敗</div>\'">'+(s.label?'<div class="modal-img-caption">'+escHtml(s.label)+'</div>':'')+'</div>';});}
  document.getElementById('modal-screenshots').innerHTML=sh;
  document.getElementById('modal').classList.add('open');
}
function openLightboxDirect(url,cap){document.getElementById('modal-title').textContent=cap;document.getElementById('modal-meta').innerHTML='';document.getElementById('modal-screenshots').innerHTML='<div class="modal-img-wrap"><img src="'+url+'" alt="'+escAttr(cap)+'" onerror="this.parentElement.innerHTML=\'<div class=\\\'no-screenshot\\\'>截圖載入失敗</div>\'"></div>';document.getElementById('modal').classList.add('open');}
function openPrdScreenshot(url,name){openLightboxDirect(url,'PRD #'+name);}
function showTab(id,btn){document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});document.getElementById('tab-'+id).classList.add('active');if(btn)btn.classList.add('active');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalIfBg(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
init();
</script>
