<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC E2E Test Report - 2026-03-16</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#37A6A9;--teal-light:#e6f5f5;--teal-dark:#2a8083;
  --gold:#F9C04C;--gold-light:#fef5dc;--gold-dark:#d4a033;
  --navy:#17335F;--navy-light:#e8ecf2;
  --green:#22c55e;--green-bg:#f0fdf4;
  --yellow:#eab308;--yellow-bg:#fefce8;
  --red:#ef4444;--red-bg:#fef2f2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
  --gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;
  --gray-900:#111827;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --radius:8px;--radius-lg:12px;
}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#fff;color:var(--gray-800);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Summary Bar */
.summary-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--gray-200);box-shadow:var(--shadow-md);padding:0}
.summary-inner{max-width:1280px;margin:0 auto;padding:16px 24px}
.summary-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.summary-title{font-size:18px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.summary-title span{font-size:13px;font-weight:500;color:var(--gray-500)}
.summary-meta{display:flex;gap:16px;flex-wrap:wrap}
.meta-tag{font-size:12px;color:var(--gray-500);background:var(--gray-100);padding:4px 10px;border-radius:20px;white-space:nowrap}
.summary-stats{display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.stat{text-align:center}
.stat-number{font-size:32px;font-weight:800;line-height:1}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-top:2px}
.stat-pass .stat-number{color:var(--green)}
.stat-skip .stat-number{color:var(--yellow)}
.stat-fail .stat-number{color:var(--red)}
.stat-time .stat-number{color:var(--navy);font-size:28px}
.progress-bar-wrap{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-bar-inner{height:100%;border-radius:3px;transition:width .6s ease}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.progress-label span{font-size:12px;color:var(--gray-500);font-weight:600}
.progress-pct{font-size:13px;font-weight:700;color:var(--teal)}

/* Tabs */
.tabs-bar{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;gap:0;border-bottom:2px solid var(--gray-200);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:600;color:var(--gray-500);background:none;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:var(--navy);background:var(--gray-50)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-count{font-size:11px;background:var(--gray-100);color:var(--gray-500);padding:1px 6px;border-radius:10px;margin-left:6px}
.tab-btn.active .tab-count{background:var(--teal-light);color:var(--teal-dark)}

/* Content */
.content{max-width:1280px;margin:0 auto;padding:24px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Spec group */
.spec-group{margin-bottom:24px;border:1px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden}
.spec-header{background:var(--gray-50);padding:10px 16px;font-size:13px;font-weight:600;color:var(--navy);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:8px}
.spec-header .file-icon{color:var(--teal);font-size:14px}
.spec-count{font-size:11px;color:var(--gray-400);font-weight:500}

/* Test rows */
.test-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--gray-100);gap:12px;transition:background .15s}
.test-row:last-child{border-bottom:none}
.test-row:hover{background:var(--gray-50)}
.test-name{flex:1;font-size:13px;color:var(--gray-700);min-width:0}
.test-name .describe{color:var(--gray-400);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-pass{background:var(--green-bg);color:var(--green)}
.badge-skip{background:var(--yellow-bg);color:var(--yellow)}
.badge-fail{background:var(--red-bg);color:var(--red)}

/* Thumbnails */
.thumb-wrap{display:flex;gap:4px;flex-shrink:0}
.thumb{width:48px;height:32px;border-radius:4px;border:1px solid var(--gray-200);object-fit:cover;cursor:pointer;transition:transform .15s,box-shadow .15s}
.thumb:hover{transform:scale(1.1);box-shadow:var(--shadow-md)}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:24px}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:var(--radius);box-shadow:var(--shadow-lg)}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;background:none;border:none;cursor:pointer;opacity:.8;transition:opacity .2s}
.lightbox-close:hover{opacity:1}
.lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:20px;white-space:nowrap}

/* Screenshot gallery */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.gallery-card{border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,transform .2s;cursor:pointer}
.gallery-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.gallery-card img{width:100%;height:140px;object-fit:cover;display:block}
.gallery-card .caption{padding:8px 12px;font-size:11px;color:var(--gray-600);font-weight:500;background:var(--gray-50);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Gallery section headers */
.gallery-section{margin-top:24px;margin-bottom:12px;font-size:15px;font-weight:700;color:var(--navy);padding-bottom:6px;border-bottom:2px solid var(--teal)}

/* Responsive */
@media(max-width:768px){
  .summary-stats{gap:16px}
  .stat-number{font-size:24px}
  .tab-btn{padding:10px 12px;font-size:12px}
  .test-row{flex-wrap:wrap;gap:6px}
  .thumb{width:40px;height:28px}
  .gallery{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>

function renderTabs() {
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPanel(btn.dataset.tab);
    });
  });
  renderPanel('m1');
}

function renderPanel(tab) {
  const content = document.getElementById('content');
  if (tab === 'gallery') {
    content.innerHTML = renderGallery();
    return;
  }
  const tabTests = tests.filter(t => t.tab === tab);
  // Group by file
  const groups = {};
  tabTests.forEach(t => {
    if (!groups[t.file]) groups[t.file] = [];
    groups[t.file].push(t);
  });
  let html = '';
  for (const [file, items] of Object.entries(groups)) {
    const passCount = items.filter(i => i.status === 'pass').length;
    const skipCount = items.filter(i => i.status === 'skip').length;
    html += `<div class="spec-group">
      <div class="spec-header">
        <span class="file-icon">&#9671;</span>
        ${file}
        <span class="spec-count">${passCount} pass${skipCount ? ' / ' + skipCount + ' skip' : ''} / ${items.length} total</span>
      </div>`;
    items.forEach(t => {
      const badgeClass = t.status === 'pass' ? 'badge-pass' : t.status === 'skip' ? 'badge-skip' : 'badge-fail';
      const badgeLabel = t.status === 'pass' ? 'Pass' : t.status === 'skip' ? 'Skip' : 'Fail';
      const badgeDot = t.status === 'pass' ? '&#10003;' : t.status === 'skip' ? '&#8212;' : '&#10007;';
      let thumbs = '';
      if (t.screenshots.length) {
        thumbs = '<div class="thumb-wrap">';
        t.screenshots.forEach(s => {
          thumbs += `<img class="thumb" src="${s}" alt="" onclick="event.stopPropagation();openLightbox('${s}','${escHtml(t.name)}')" loading="lazy">`;
        });
        thumbs += '</div>';
      }
      html += `<div class="test-row">
        <span class="badge ${badgeClass}">${badgeDot} ${badgeLabel}</span>
        <div class="test-name">
          <span class="describe">${escHtml(t.describe)} &rsaquo;</span> ${escHtml(t.name)}
        </div>
        ${thumbs}
      </div>`;
    });
    html += '</div>';
  }
  content.innerHTML = html;
}

function renderGallery() {
  let html = '';
  for (const [section, files] of Object.entries(allScreenshots)) {
    html += `<div class="gallery-section">${section} (${files.length})</div>`;
    html += '<div class="gallery">';
    files.forEach(f => {
      const url = SS + f;
      const label = f.replace(/^(crud\/|flow\/)/,'').replace(/\.png$/,'').replace(/--/g,' / ').replace(/-/g,' ');
      html += `<div class="gallery-card" onclick="openLightbox('${url}','${escHtml(label)}')">
        <img src="${url}" alt="${escHtml(label)}" loading="lazy">
        <div class="caption">${escHtml(label)}</div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function openLightbox(src, caption) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
renderTabs();
